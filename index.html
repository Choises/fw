  <script src="https://cloudflare.com"></script>

  <script>
    // (Animation)
    var feTurb = document.querySelector('#feturnulence');
    var currentProgress = 0;

    function animateWater() {
        currentProgress += 0.001;
        if (currentProgress > 1.5) { currentProgress = 0; }
        var bfX = currentProgress * 0.005 + 0.001;
        var bfY = currentProgress * 0.05 + 0.1;
        if(feTurb) {
            feTurb.setAttribute('baseFrequency', bfX + ' ' + bfY);
        }
        requestAnimationFrame(animateWater);
    }
    
    // 
    window.addEventListener('load', animateWater);

    // 
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('selectstart', e => e.preventDefault());
    document.addEventListener('keydown', function(e) {
        if (e.keyCode === 123 || 
            (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 73)) || 
            (e.ctrlKey && e.shiftKey && e.keyCode === 73)) {
            e.preventDefault();
            return false;
        }
    });
  </script>
